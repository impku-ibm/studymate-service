version: "3.9"

services:
  # ============ NGINX (Reverse Proxy + Frontend) ============
  nginx:
    image: nginx:alpine
    container_name: studymate-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - studymate-net

  # ============ SPRING BOOT BACKEND ============
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    container_name: studymate-backend
    restart: always
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:postgresql://postgres:5432/studymate
      - DATABASE_USERNAME=${POSTGRES_USER:-studymate}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/studymate
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - studymate-net

  # ============ POSTGRESQL ============
  postgres:
    image: postgres:16-alpine
    container_name: studymate-postgres
    restart: always
    environment:
      POSTGRES_DB: studymate
      POSTGRES_USER: ${POSTGRES_USER:-studymate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studymate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studymate-net
    # NOT exposed to host — only accessible within Docker network

  # ============ REDIS ============
  redis:
    image: redis:7-alpine
    container_name: studymate-redis
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studymate-net

  # ============ MONGODB ============
  mongo:
    image: mongo:7
    container_name: studymate-mongo
    restart: always
    volumes:
      - mongodata:/data/db
    networks:
      - studymate-net

  # ============ CERTBOT (SSL) ============
  certbot:
    image: certbot/certbot
    container_name: studymate-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"

volumes:
  pgdata:
  redisdata:
  mongodata:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  studymate-net:
    driver: bridge
