spring:
   data:
      mongodb:
         uri: ${MONGODB_URI:mongodb://localhost:27017/studymate}
   datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studymate}
      username: ${SPRING_DATASOURCE_USERNAME:postgres}
      password: ${SPRING_DATASOURCE_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver

   jpa:
      hibernate:
         ddl-auto: validate
      show-sql: false

   flyway:
      enabled: true
      locations: classpath:db/migration
      validate-on-migrate: false
      out-of-order: true
