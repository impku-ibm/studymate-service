server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongo:27017/studymate}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl: true 
      client-name: ""
      timeout: 5000

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/studymate}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    out-of-order: true

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-which-is-long}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    com.portal.studymate: INFO
    org.springframework.security: WARN
    root: INFO
